name: trailsync
description: "TravelSync - Track, Analyse & Share Your Travel Journeys"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # Supabase
  supabase_flutter: ^2.9.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Charts
  fl_chart: ^0.70.2

  # Networking
  http: ^1.3.0

  # Local Storage
  shared_preferences: ^2.5.3

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  timeago: ^3.7.0

  # QR Code
  qr_flutter: ^4.1.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Share
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
